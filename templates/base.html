{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock title %}</title>
  <link rel="stylesheet" href="{% static "css/reset.css" %}">
  <link rel="stylesheet" href="{% static "css/style.css" %}">
  <link rel="shortcut icon" href="{% static "images/tab.jpg" %}">
  {% block styles %}{% endblock styles %}
</head>
<body>

<header class="main-header">
  <div class="header-container">
    <div class="logo">
      <a href="{% url 'home' %}">
        <h1>Lsv Shop</h1>
      </a>
    </div>
    
    <div class="search-box">
      <form action="{% url 'home' %}" method="GET" class="search-form">
        <input type="text" 
               name="q" 
               placeholder="Поиск товаров..." 
               value="{{ search_query }}"
               class="search-input">
        <button type="submit" class="search-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </button>
      </form>
    </div>
    
    <div class="header-icons">
      {% if user.is_authenticated %}
        <a href="{% url 'cart_detail' %}" class="icon-link" title="Корзина">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#ccc" viewBox="0 0 16 16">
            <path d="M0 1a1 1 0 0 1 1-1h1.5a1 1 0 0 1 .96.74L3.89 3H14a1 1 0 0 1 .96 1.27l-1.5 6A1 1 0 0 1 12.5 11H5a1 1 0 0 1-.96-.74L2.01 2H1a1 1 0 0 1-1-1zm5 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm7 1a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
          </svg>
          {% if cart_items_count %}
            <span class="cart-count">{{ cart_items_count }}</span>
          {% endif %}
        </a>
        <a href="{% url 'logout' %}" class="icon-link" title="Выйти">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#ccc" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
            <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
          </svg>
        </a>
      {% else %}
        <a href="{% url 'login' %}" id="profile-btn" class="icon-link" title="Войти">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#ccc" viewBox="0 0 16 16">
            <path d="M10 5a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/>
            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-6a6 6 0 0 0-4.472 10.03c.03-.27.07-.54.13-.8.3-1.3 1.3-2.3 2.6-2.6.5-.1 1-.2 1.7-.2s1.2.1 1.7-.2c1.3.3 2.3 1.3 2.6 2.6.06.26.1.53.13.8A6 6 0 0 0 8 2z"/>
          </svg>
        </a>
      {% endif %}
    </div>
  </div>
</header>

<!-- Сайдбар удален -->

<main class="main-content">
  {% block container %}
    <div class="empty-content">
      <p>К сожалению здесь ничего нет!</p>
    </div>
  {% endblock container %}
</main>

<style>
  .header-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }
  
  .logo a {
    text-decoration: none;
  }
  
  .logo h1 {
    margin: 0;
    font-size: 24px;
    color: #fff;
  }
  
  .search-box {
    flex: 1;
    max-width: 500px;
  }
  
  .search-form {
    display: flex;
    position: relative;
    width: 100%;
  }
  
  .search-input {
    width: 100%;
    padding: 10px 40px 10px 15px;
    border: 1px solid #ddd;
    border-radius: 25px;
    font-size: 14px;
    background: white;
    transition: all 0.3s ease;
  }
  
  .search-input:focus {
    outline: none;
    border-color: #000;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
  }
  
  .search-btn {
    position: absolute;
    right: 5px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .search-btn svg {
    width: 18px;
    height: 18px;
    stroke: #666;
  }
  
  .search-btn:hover svg {
    stroke: #000;
  }
  
  .header-icons {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  
  .icon-link {
    position: relative;
    display: flex;
    align-items: center;
    text-decoration: none;
    transition: opacity 0.3s ease;
  }
  
  .icon-link:hover {
    opacity: 0.8;
  }
  
  .cart-count {
    position: absolute;
    top: -8px;
    right: -12px;
    background: #ff4444;
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 16px;
    text-align: center;
  }
  
  .icon-link h3 {
    margin: 0;
    font-size: 14px;
    color: #ccc;
  }
  
  .icon-link:hover h3 {
    color: #fff;
  }
  
  /* Основной контент - на всю ширину */
  .main-content {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 20px;
    min-height: calc(100vh - 150px);
    box-sizing: border-box;
  }
  
  /* Сетка карточек на всю ширину */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 30px;
    width: 100%;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  /* Стили для карточек (если их нет в style.css) */
  .product-card {
    background: rgb(0, 0, 0);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  
  .product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  
  .product-image {
    width: 100%;
    height: 200px;
    overflow: hidden;
  }
  
  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .product-info {
    padding: 15px;
  }
  
  .product-title {
    font-size: 18px;
    font-weight: bold;
    margin: 0 0 10px 0;
    color: #f4f4f4;
  }
  
  .product-price {
    font-size: 20px;
    font-weight: bold;
    color: #ffffff;
    margin: 10px 0;
  }
  
  .product-description {
    font-size: 14px;
    color: #000000;
    line-height: 1.4;
    margin: 10px 0;
  }
  
  .product-btn {
    display: inline-block;
    width: 100%;
    padding: 10px;
    background: #000;
    color: white;
    text-align: center;
    text-decoration: none;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s ease;
  }
  
  .product-btn:hover {
    background: #333;
  }
  
  .empty-content {
    text-align: center;
    padding: 60px 20px;
    background: rgb(0, 0, 0);
    border-radius: 16px;
    color: #666;
  }
  
  @media (max-width: 768px) {
    .header-container {
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .logo {
      width: auto;
    }
    
    .search-box {
      order: 3;
      width: 100%;
      max-width: none;
      margin-top: 10px;
    }
    
    .header-icons {
      margin-left: auto;
    }
    
    .search-input {
      font-size: 16px;
    }
    
    .main-content {
      padding: 15px;
    }
    
    .products-grid {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    
    .product-image {
      height: 180px;
    }
  }
  
  @media (max-width: 480px) {
    .products-grid {
      grid-template-columns: 1fr;
      gap: 15px;
    }
  }
</style>

<script>
  // Автоматическая отправка формы при вводе (опционально)
  let searchTimeout;
  const searchInput = document.querySelector('.search-input');
  
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        if (this.value.length >= 2) {
          this.closest('form').submit();
        }
      }, 500);
    });
  }
</script>

</body>
</html>
